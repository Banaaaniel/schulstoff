<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basisfach: Geschichte / Methoden und Arbeitsweisen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #080808;
            color: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 20px;
        }
        
        header h1 {
            font-size: 2em;
            color: #ffffff;
        }
        
        .back-link {
            color: #dcdcdc;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #444444;
            transition: background 0.2s;
        }
        
        .back-link:hover {
            background: #1c1c1c;
        }
        
        .content {
            min-height: 300px;
            padding: 40px 20px;
        }
        
        .items-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        
        .item {
            background: #111111;
            border: 1px solid #444444;
            padding: 20px;
            text-decoration: none;
            color: #f5f5f5;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .item:hover {
            background: #1c1c1c;
            transform: translateY(-2px);
        }
        
        .item-icon {
            font-size: 24px;
            min-width: 24px;
        }
        
        .item-name {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .empty-message {
            text-align: center;
            color: #888888;
            padding: 40px 20px;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            border-top: 2px solid #f5f5f5;
            padding-top: 20px;
            font-size: 0.9em;
            color: #c4c4c4;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Basisfach: Geschichte</h1>
            <a href="../index.html" class="back-link" id="backLink">← Back</a>
        </header>
        
        <div class="content">
            <div class="items-list" id="itemsList"></div>
            <div class="empty-message" id="emptyMessage">No items added yet. Edit items.js to add PDFs or folders.</div>
        </div>
        
        <footer>
            <p id="footerText">SchulArchiv - Banaaaniel</p>
        </footer>
    </div>
    <script src="../text.js"></script>
    <script src="./items.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const itemsList = document.getElementById('itemsList');
            const emptyMessage = document.getElementById('emptyMessage');
            
            if (window.sharedText) {
                document.getElementById('backLink').textContent = window.sharedText.backLabel || document.getElementById('backLink').textContent;
                emptyMessage.textContent = window.sharedText.emptyItemsMessage || emptyMessage.textContent;
                document.getElementById('footerText').textContent = window.sharedText.footer || document.getElementById('footerText').textContent;
            }
            
            if (!window.subjectItems || window.subjectItems.length === 0) {
                itemsList.style.display = 'none';
                emptyMessage.style.display = 'block';
                return;
            }
            
            emptyMessage.style.display = 'none';
            window.subjectItems.forEach(item => {
                const link = document.createElement('a');
                link.className = 'item';
                
                const icon = document.createElement('div');
                icon.className = 'item-icon';
                icon.textContent = item.type === 'folder' ? '📁' : '📄';
                
                const name = document.createElement('div');
                name.className = 'item-name';
                name.textContent = item.name;
                
                link.appendChild(icon);
                link.appendChild(name);
                link.href = item.path;
                
                if (item.type === 'pdf') {
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                }
                
                itemsList.appendChild(link);
            });

            if (window.sharedText) {
                document.getElementById('backLink').textContent = window.sharedText.backLabel || document.getElementById('backLink').textContent;
                document.getElementById('emptyMessage').textContent = window.sharedText.emptyItemsMessage || document.getElementById('emptyMessage').textContent;
                document.getElementById('footerText').textContent = window.sharedText.footer || document.getElementById('footerText').textContent;
            }
        });
    </script>
